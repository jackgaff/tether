openapi: 3.1.0
info:
  title: Nova Echoes API
  version: 0.1.0
  description: >
    Starter API contract for the Nova Echoes hackathon project. This backend is
    shaped for voice-driven check-ins, summaries, and future caregiver tooling.
servers:
  - url: http://localhost:8080
paths:
  /:
    get:
      operationId: getRoot
      summary: Service metadata
      responses:
        "200":
          description: Service metadata returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
  /openapi.yaml:
    get:
      operationId: getOpenAPIDocument
      summary: Fetch the OpenAPI source document
      responses:
        "200":
          description: OpenAPI document returned
          content:
            application/yaml:
              schema:
                type: string
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/check-ins:
    get:
      operationId: listCheckIns
      summary: List check-ins
      parameters:
        - in: query
          name: patientId
          required: false
          schema:
            type: string
          description: Filter results for a single patient profile.
      responses:
        "200":
          description: Check-ins returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: createCheckIn
      summary: Create a check-in summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckInRequest"
      responses:
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            service:
              type: string
              example: Nova Echoes
            env:
              type: string
              example: development
            authMode:
              type: string
              example: off
            databaseURLConfigured:
              type: boolean
              example: true
            time:
              type: string
              format: date-time
      required:
        - data
    RootResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              example: Nova Echoes
            environment:
              type: string
              example: development
            message:
              type: string
            docsPath:
              type: string
              example: /openapi.yaml
      required:
        - data
    CreateCheckInRequest:
      type: object
      properties:
        patientId:
          type: string
          example: patient-001
        summary:
          type: string
          example: Caller remembered breakfast and reported feeling steady today.
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
          example: call-agent
        reminder:
          type: string
          example: Keep your medications near the breakfast table.
      required:
        - patientId
        - summary
        - status
        - agent
    CheckIn:
      type: object
      properties:
        id:
          type: string
          example: chk_0001
        patientId:
          type: string
        summary:
          type: string
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
        reminder:
          type: string
        recordedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - summary
        - status
        - agent
        - recordedAt
    CheckInResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CheckIn"
      required:
        - data
    CheckInListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
        meta:
          type: object
          properties:
            count:
              type: integer
      required:
        - data
        - meta
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
