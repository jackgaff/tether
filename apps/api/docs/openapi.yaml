openapi: 3.1.0
info:
  title: Nova Echoes API
  version: 0.1.0
  description: >
    Starter API contract for the Nova Echoes hackathon project. This backend is
    shaped for voice-driven check-ins, summaries, and future caregiver tooling.
servers:
  - url: http://localhost:8080
paths:
  /:
    get:
      operationId: getRoot
      summary: Service metadata
      responses:
        "200":
          description: Service metadata returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
  /openapi.yaml:
    get:
      operationId: getOpenAPIDocument
      summary: Fetch the OpenAPI source document
      responses:
        "200":
          description: OpenAPI document returned
          content:
            application/yaml:
              schema:
                type: string
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/check-ins:
    get:
      operationId: listCheckIns
      summary: List check-ins
      parameters:
        - in: query
          name: patientId
          required: false
          schema:
            type: string
          description: Filter results for a single patient profile.
      responses:
        "200":
          description: Check-ins returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: createCheckIn
      summary: Create a check-in summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckInRequest"
      responses:
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/v1/voice/voices:
    get:
      operationId: listVoiceOptions
      summary: List server-allowed Nova voice options
      responses:
        "200":
          description: Voice options returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceListResponse"
  /api/v1/voice/lab/conversations:
    get:
      operationId: listVoiceLabConversations
      summary: List saved prompt-lab conversations from local artifact exports
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Saved prompt-lab conversations returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceLabConversationListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/patients/{id}/preferences:
    get:
      operationId: getPatientPreferences
      summary: Load a patient's setup-time voice preferences
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient preference snapshot returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPreferenceResponse"
    put:
      operationId: putPatientPreferences
      summary: Save a patient's setup-time voice preferences
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientPreferenceRequest"
      responses:
        "200":
          description: Patient preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPreferenceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/voice/sessions:
    post:
      operationId: createVoiceSession
      summary: Create a browser voice session placeholder and attach token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoiceSessionRequest"
      responses:
        "201":
          description: Voice session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            service:
              type: string
              example: Nova Echoes
            env:
              type: string
              example: development
            authMode:
              type: string
              example: off
            databaseURLConfigured:
              type: boolean
              example: true
            time:
              type: string
              format: date-time
      required:
        - data
    RootResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              example: Nova Echoes
            environment:
              type: string
              example: development
            message:
              type: string
            docsPath:
              type: string
              example: /openapi.yaml
      required:
        - data
    CreateCheckInRequest:
      type: object
      properties:
        patientId:
          type: string
          example: patient-001
        summary:
          type: string
          example: Caller remembered breakfast and reported feeling steady today.
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
          example: call-agent
        reminder:
          type: string
          example: Keep your medications near the breakfast table.
      required:
        - patientId
        - summary
        - status
        - agent
    CheckIn:
      type: object
      properties:
        id:
          type: string
          example: chk_0001
        patientId:
          type: string
        summary:
          type: string
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
        reminder:
          type: string
        recordedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - summary
        - status
        - agent
        - recordedAt
    CheckInResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CheckIn"
      required:
        - data
    CheckInListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
        meta:
          type: object
          properties:
            count:
              type: integer
      required:
        - data
        - meta
    Voice:
      type: object
      properties:
        id:
          type: string
          example: matthew
        displayName:
          type: string
          example: Matthew
        locale:
          type: string
          example: en-US
        polyglot:
          type: boolean
          example: true
        isDefault:
          type: boolean
          example: true
        browserSupported:
          type: boolean
          example: true
        connectNativeSupported:
          type: boolean
          example: true
      required:
        - id
        - displayName
        - locale
        - polyglot
        - isDefault
        - browserSupported
        - connectNativeSupported
    VoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Voice"
      required:
        - data
    PatientPreference:
      type: object
      properties:
        patientId:
          type: string
          example: patient-001
        defaultVoiceId:
          type: string
          example: matthew
        isConfigured:
          type: boolean
          example: true
        updatedAt:
          type: string
          format: date-time
      required:
        - patientId
        - defaultVoiceId
        - isConfigured
    PatientPreferenceResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PatientPreference"
      required:
        - data
    UpdatePatientPreferenceRequest:
      type: object
      properties:
        defaultVoiceId:
          type: string
          example: tiffany
      required:
        - defaultVoiceId
    AudioConfig:
      type: object
      properties:
        encoding:
          type: string
          example: pcm_s16le
        sampleRateHz:
          type: integer
          enum:
            - 8000
            - 16000
            - 24000
        channels:
          type: integer
          example: 1
      required:
        - encoding
        - sampleRateHz
        - channels
    CreateVoiceSessionRequest:
      type: object
      properties:
        patientId:
          type: string
          example: patient-001
        voiceId:
          type: string
          example: matthew
        systemPrompt:
          type: string
          maxLength: 40960
          example: >-
            You are a gentle check-in assistant for older adults. Speak slowly,
            ask one question at a time, and confirm important details back to the caller.
      required:
        - patientId
    VoiceSession:
      type: object
      properties:
        id:
          type: string
        voiceId:
          type: string
        websocketPath:
          type: string
          example: /api/v1/voice/sessions/0195f0dc-0f1e-7ca3-a739-f8c6f95e0421/stream
        streamToken:
          type: string
        streamTokenExpiresAt:
          type: string
          format: date-time
        audioInput:
          $ref: "#/components/schemas/AudioConfig"
        audioOutput:
          $ref: "#/components/schemas/AudioConfig"
        drainSeconds:
          type: integer
          example: 5
        maxSessionSeconds:
          type: integer
          example: 480
      required:
        - id
        - voiceId
        - websocketPath
        - streamToken
        - streamTokenExpiresAt
        - audioInput
        - audioOutput
        - drainSeconds
        - maxSessionSeconds
    VoiceSessionResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/VoiceSession"
      required:
        - data
    VoiceLabConversationTurn:
      type: object
      properties:
        sequenceNo:
          type: integer
        direction:
          type: string
          enum:
            - user
            - assistant
        modality:
          type: string
          enum:
            - audio
            - text
        text:
          type: string
        occurredAt:
          type: string
          format: date-time
        stopReason:
          type: string
      required:
        - sequenceNo
        - direction
        - modality
        - text
        - occurredAt
    VoiceLabConversation:
      type: object
      properties:
        id:
          type: string
        voiceId:
          type: string
        status:
          type: string
        systemPrompt:
          type: string
        stopReason:
          type: string
        createdAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        jsonPath:
          type: string
        markdownPath:
          type: string
        turns:
          type: array
          items:
            $ref: "#/components/schemas/VoiceLabConversationTurn"
      required:
        - id
        - voiceId
        - status
        - createdAt
        - endedAt
        - turns
    VoiceLabConversationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/VoiceLabConversation"
        meta:
          type: object
          properties:
            count:
              type: integer
            limit:
              type: integer
      required:
        - data
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
