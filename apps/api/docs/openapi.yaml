openapi: 3.1.0
info:
  title: Nova Echoes API
  version: 0.2.0
  description: >
    Phase 1 API contract for Nova Echoes. The backend supports voice-driven
    check-ins, caregiver-administered patient profiles, caregiver-requested and
    scheduled call runs,
    strict post-call analysis, and next-call recommendation approval.
servers:
  - url: http://localhost:8080
paths:
  /:
    get:
      operationId: getRoot
      summary: Service metadata
      responses:
        "200":
          description: Service metadata returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
  /openapi.yaml:
    get:
      operationId: getOpenAPIDocument
      summary: Fetch the OpenAPI source document
      responses:
        "200":
          description: OpenAPI document returned
          content:
            application/yaml:
              schema:
                type: string
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/check-ins:
    get:
      operationId: listCheckIns
      summary: List check-ins
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: patientId
          required: false
          schema:
            type: string
          description: Filter results for a single patient profile.
      responses:
        "200":
          description: Check-ins returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: createCheckIn
      summary: Create a check-in summary
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckInRequest"
      responses:
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/v1/voice/voices:
    get:
      operationId: listVoiceOptions
      summary: List server-allowed Nova voice options
      responses:
        "200":
          description: Voice options returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceListResponse"
  /api/v1/voice/lab/conversations:
    get:
      operationId: listVoiceLabConversations
      summary: List saved prompt-lab conversations from local artifact exports
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Saved prompt-lab conversations returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceLabConversationListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/patients/{id}/preferences:
    get:
      operationId: getPatientPreferences
      summary: Load a patient's setup-time voice preferences
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Patient preference snapshot returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPreferenceResponse"
    put:
      operationId: putPatientPreferences
      summary: Save a patient's setup-time voice preferences
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientPreferenceRequest"
      responses:
        "200":
          description: Patient preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPreferenceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/voice/sessions:
    post:
      operationId: createVoiceSession
      summary: Create a browser voice session placeholder and attach token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoiceSessionRequest"
      responses:
        "201":
          description: Voice session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/admin/session/login:
    post:
      operationId: loginAdminSession
      summary: Create a demo admin session and set the signed cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Session established
          headers:
            Set-Cookie:
              description: HttpOnly admin session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
  /api/v1/admin/session:
    get:
      operationId: getAdminSession
      summary: Inspect the active admin session
      security:
        - AdminSessionAuth: []
      responses:
        "200":
          description: Active admin session returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
  /api/v1/admin/session/logout:
    post:
      operationId: logoutAdminSession
      summary: Clear the active admin session cookie
      security:
        - AdminSessionAuth: []
      responses:
        "200":
          description: Session cleared
          headers:
            Set-Cookie:
              description: Expired admin session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogoutResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
  /api/v1/admin/caregivers:
    post:
      operationId: createCaregiver
      summary: Create a caregiver profile
      security:
        - AdminSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaregiverRequest"
      responses:
        "201":
          description: Caregiver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
  /api/v1/admin/caregivers/{id}:
    get:
      operationId: getCaregiver
      summary: Load a caregiver profile
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CaregiverIdPath"
      responses:
        "200":
          description: Caregiver returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateCaregiver
      summary: Update a caregiver profile
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CaregiverIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaregiverRequest"
      responses:
        "200":
          description: Caregiver updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/patients:
    post:
      operationId: createPatient
      summary: Create a patient profile linked to one caregiver
      security:
        - AdminSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/admin/patients/{id}:
    get:
      operationId: getPatient
      summary: Load a patient profile
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Patient returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updatePatient
      summary: Update a patient profile
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200":
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/admin/patients/{id}/screening-schedule:
    get:
      operationId: getPatientScreeningSchedule
      summary: Load the patient's scheduled screening cadence
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Screening schedule returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningScheduleResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putPatientScreeningSchedule
      summary: Create or update the patient's scheduled screening cadence
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScreeningScheduleRequest"
      responses:
        "200":
          description: Screening schedule saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningScheduleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/patients/{id}/consent:
    get:
      operationId: getPatientConsentState
      summary: Load the patient consent state
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Consent state returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentStateResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putPatientConsentState
      summary: Create or update the patient consent state
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConsentRequest"
      responses:
        "200":
          description: Consent state saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentStateResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/patients/{id}/pause:
    post:
      operationId: pausePatientCalling
      summary: Pause outgoing calls for a patient
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PausePatientRequest"
      responses:
        "200":
          description: Patient calling paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: unpausePatientCalling
      summary: Resume outgoing calls for a patient
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Patient calling resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/call-templates:
    get:
      operationId: listCallTemplates
      summary: List active and inactive call templates
      security:
        - AdminSessionAuth: []
      responses:
        "200":
          description: Call templates returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallTemplateListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
  /api/v1/admin/patients/{id}/dashboard:
    get:
      operationId: getPatientDashboard
      summary: Load the caregiver dashboard snapshot for a patient
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Dashboard snapshot returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/patients/{id}/calls:
    post:
      operationId: createPatientCallRun
      summary: Create a caregiver-requested or approved follow-up call run
      description: >
        For caregiver-requested calls, provide exactly one of `callTemplateId`
        or `callType`. If only `callType` is provided, the server resolves it
        to the single active template for that type. When `channel=browser`,
        the response includes a voice session bootstrap object.
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallRequest"
      responses:
        "201":
          description: Call run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCallResponseEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/admin/calls/{id}:
    get:
      operationId: getCallRun
      summary: Load a call run with transcript turns, analysis job, and analysis if present
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CallRunIdPath"
      responses:
        "200":
          description: Call run detail returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallRunDetailResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/calls/{id}/analyze:
    post:
      operationId: analyzeCallRun
      summary: Create or reuse the structured extraction job for a completed call run
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CallRunIdPath"
        - in: query
          name: force
          required: false
          description: Re-run analysis and overwrite the existing stored result.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Analysis job returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisJobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/admin/calls/{id}/analysis-job:
    get:
      operationId: getCallRunAnalysisJob
      summary: Load the structured extraction job status for a call run
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CallRunIdPath"
      responses:
        "200":
          description: Analysis job returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisJobResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/calls/{id}/analysis:
    get:
      operationId: getCallRunAnalysis
      summary: Load the saved structured extraction result for a call run
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/CallRunIdPath"
      responses:
        "200":
          description: Analysis returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisRecordResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/admin/patients/{id}/next-call:
    get:
      operationId: getPatientNextCallPlan
      summary: Load the active next-call recommendation for a patient
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Active next-call plan returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextCallPlanResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updatePatientNextCallPlan
      summary: Approve, edit, reject, or cancel the active next-call plan
      security:
        - AdminSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNextCallPlanRequest"
      responses:
        "200":
          description: Next-call plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextCallPlanResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedSessionError"
        "404":
          $ref: "#/components/responses/NotFoundError"
components:
  parameters:
    PatientIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Patient identifier.
    CaregiverIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Caregiver identifier.
    CallRunIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Call run identifier.
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    AdminSessionAuth:
      type: apiKey
      in: cookie
      name: nova_echoes_admin_session
  responses:
    ValidationError:
      description: Request body or parameters failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedSessionError:
      description: Missing or invalid admin session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Request could not be completed because of a resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            service:
              type: string
              example: Nova Echoes
            env:
              type: string
              example: development
            authMode:
              type: string
              example: off
            databaseURLConfigured:
              type: boolean
              example: true
            time:
              type: string
              format: date-time
          required:
            - status
            - service
            - env
            - authMode
            - databaseURLConfigured
            - time
      required:
        - data
    RootResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              example: Nova Echoes
            environment:
              type: string
              example: development
            message:
              type: string
            docsPath:
              type: string
              example: /openapi.yaml
          required:
            - name
            - environment
            - docsPath
      required:
        - data
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
    CreateCheckInRequest:
      type: object
      additionalProperties: false
      properties:
        patientId:
          type: string
          example: patient-001
        summary:
          type: string
          example: Caller remembered breakfast and reported feeling steady today.
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
          example: call-agent
        reminder:
          type: string
          example: Keep your medications near the breakfast table.
      required:
        - patientId
        - summary
        - status
        - agent
    CheckIn:
      type: object
      properties:
        id:
          type: string
          example: chk_0001
        patientId:
          type: string
        summary:
          type: string
        status:
          type: string
          enum:
            - scheduled
            - completed
            - needs_follow_up
        agent:
          type: string
        reminder:
          type: string
        recordedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - summary
        - status
        - agent
        - recordedAt
    CheckInResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CheckIn"
      required:
        - data
    CheckInListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
        meta:
          type: object
          properties:
            count:
              type: integer
          required:
            - count
      required:
        - data
        - meta
    Voice:
      type: object
      properties:
        id:
          type: string
          example: matthew
        displayName:
          type: string
          example: Matthew
        locale:
          type: string
          example: en-US
        polyglot:
          type: boolean
          example: true
        isDefault:
          type: boolean
          example: true
        browserSupported:
          type: boolean
          example: true
        connectNativeSupported:
          type: boolean
          example: true
      required:
        - id
        - displayName
        - locale
        - polyglot
        - isDefault
        - browserSupported
        - connectNativeSupported
    VoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Voice"
      required:
        - data
    PatientPreference:
      type: object
      properties:
        patientId:
          type: string
          example: patient-001
        defaultVoiceId:
          type: string
          example: matthew
        isConfigured:
          type: boolean
          example: true
        updatedAt:
          type: string
          format: date-time
      required:
        - patientId
        - defaultVoiceId
        - isConfigured
