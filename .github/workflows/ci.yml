name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nova_echoes
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nova_echoes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: false

      - name: Cache Bun install artifacts
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/go-build
            .cache/go-mod
          key: go-${{ runner.os }}-${{ hashFiles('apps/api/go.mod', 'apps/api/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify repo checks
        run: make check

      - name: Verify Postgres-backed API integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/nova_echoes?sslmode=disable
        run: make test-api-integration

      - name: Validate Docker Compose config
        run: make compose-config
